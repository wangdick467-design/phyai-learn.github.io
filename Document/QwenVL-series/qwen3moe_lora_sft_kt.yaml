### model
model_name_or_path: /home/s202507020/workspace/models/Qwen/Qwen3-VL-8B-Instruct
trust_remote_code: true

### method
stage: sft
do_train: true
finetuning_type: lora
lora_rank: 8
lora_target: all

### dataset
dataset: AesMMIT
template: qwen3_vl_nothink
cutoff_len: 3072
max_samples: 100000
overwrite_cache: true
preprocessing_num_workers: 4
dataloader_num_workers: 2

### output
output_dir: saves/Kllama_Qwen3vl
logging_steps: 20
save_steps: 500
plot_loss: true
overwrite_output_dir: truea
save_only_model: false
report_to: none  # choices: [none, wandb, tensorboard, swanlab, mlflow]

### train
per_device_train_batch_size: 1
gradient_accumulation_steps: 16
learning_rate: 2.0e-5
num_train_epochs: 3
lr_scheduler_type: cosine
warmup_ratio: 0.05
bf16: true
ddp_timeout: 180000000
resume_from_checkpoint: null

### ktransformers
use_kt: false # use KTransformers as LoRA sft backend
kt_optimize_rule: examples/kt_optimize_rules/Qwen3vl.yaml
cpu_infer: 32
chunk_size: 8192

